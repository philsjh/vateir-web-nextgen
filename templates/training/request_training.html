{% extends "base_dashboard.html" %}

{% block title %}Request Training — {{ site_config.site_name|default:"VATéir" }}{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <h1 class="text-2xl font-bold text-white mb-6"><span class="text-brand-400">///</span> Request Training</h1>

  <div class="glass rounded-2xl p-6">
    <form method="post">
      {% csrf_token %}
      <div class="mb-4">
        <label class="block text-sm font-medium text-white/60 mb-2">Target Rating</label>
        <select name="requested_rating" class="glass-select w-full">
          <option value="2">S1 - Tower Trainee</option>
          <option value="3">S2 - Tower Controller</option>
          <option value="4">S3 - TMA Controller</option>
          <option value="5">C1 - Enroute Controller</option>
          <option value="6">C2 - Senior Controller</option>
          <option value="7">C3 - Senior Controller</option>
        </select>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-white/60 mb-2">Additional Notes</label>
        <textarea name="notes" rows="4" class="glass-input w-full" placeholder="Any additional information..."></textarea>
      </div>
      <div class="flex items-center gap-3">
        <button type="submit" class="btn-brand">
          Submit Request
        </button>
        <a href="{% url 'training:my_training' %}" class="btn-ghost">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
