{% extends "base_dashboard.html" %}

{% block title %}Request Training — {{ site_config.site_name|default:"VATéir" }}{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <h1 class="text-2xl font-bold text-white mb-6"><span class="text-brand-400">///</span> Request Training</h1>

  <div class="glass rounded-2xl p-6">
    <form method="post">
      {% csrf_token %}
      <div class="mb-4">
        <label class="block text-sm font-medium text-white/60 mb-2">Course</label>
        <select name="course" id="course-select" class="glass-select w-full" required>
          <option value="">Select a course...</option>
          {% for course in courses %}
            <option value="{{ course.pk }}" data-description="{{ course.description }}" data-from="{{ course.from_rating_label }}" data-to="{{ course.to_rating_label }}">
              {{ course.name }} ({{ course.from_rating_label }} &rarr; {{ course.to_rating_label }})
            </option>
          {% endfor %}
        </select>
      </div>

      <!-- Course description panel -->
      <div id="course-info" class="mb-4 hidden">
        <div class="glass rounded-xl p-4 border border-brand-500/10">
          <div class="flex items-center gap-2 mb-2">
            <span class="text-xs font-mono text-white/40">From</span>
            <span id="course-from" class="badge-brand text-xs"></span>
            <span class="text-xs text-white/30">&rarr;</span>
            <span id="course-to" class="badge-success text-xs"></span>
          </div>
          <p id="course-description" class="text-sm text-white/60"></p>
        </div>
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-white/60 mb-2">Additional Notes</label>
        <textarea name="notes" rows="4" class="glass-input w-full" placeholder="Any additional information about your request..."></textarea>
      </div>
      <div class="flex items-center gap-3">
        <button type="submit" class="btn-brand">
          Submit Request
        </button>
        <a href="{% url 'training:my_training' %}" class="btn-ghost">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function() {
  var select = document.getElementById('course-select');
  var infoPanel = document.getElementById('course-info');
  var descEl = document.getElementById('course-description');
  var fromEl = document.getElementById('course-from');
  var toEl = document.getElementById('course-to');

  select.addEventListener('change', function() {
    var opt = select.options[select.selectedIndex];
    if (opt.value) {
      fromEl.textContent = opt.dataset.from;
      toEl.textContent = opt.dataset.to;
      descEl.textContent = opt.dataset.description;
      infoPanel.classList.remove('hidden');
    } else {
      infoPanel.classList.add('hidden');
    }
  });
})();
</script>
{% endblock %}
