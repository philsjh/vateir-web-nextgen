{% extends "base_admin.html" %}

{% block title %}Edit Controller {{ controller.cid }} — Admin Panel{% endblock %}
{% block admin_section %}Controllers{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <div class="mb-6">
    <a href="{% url 'admin_panel:controllers_list' %}" class="btn-ghost text-sm">&larr; Back to Controllers</a>
  </div>
  <h1 class="text-2xl font-bold text-white dark:text-white mb-6">Edit Controller {{ controller.cid }}</h1>

  <div class="glass rounded-2xl p-6">
    <form method="post">
      {% csrf_token %}
      <div class="grid sm:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-sm font-medium text-white/60 mb-2">First Name</label>
          <input type="text" name="first_name" value="{{ controller.first_name }}" class="glass-input w-full" />
        </div>
        <div>
          <label class="block text-sm font-medium text-white/60 mb-2">Last Name</label>
          <input type="text" name="last_name" value="{{ controller.last_name }}" class="glass-input w-full" />
        </div>
      </div>
      <div class="grid sm:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-sm font-medium text-white/60 mb-2">Email</label>
          <input type="email" name="email" value="{{ controller.email }}" class="glass-input w-full" />
        </div>
        <div>
          <label class="block text-sm font-medium text-white/60 mb-2">Rating</label>
          <input type="number" name="rating" value="{{ controller.rating }}" min="1" max="12" class="glass-input w-full" />
        </div>
      </div>
      <div class="flex items-center gap-6 mb-4">
        <label class="flex items-center gap-2 text-sm text-white/60">
          <input type="checkbox" name="is_active" {% if controller.is_active %}checked{% endif %} class="rounded border-white/10 bg-white/5 text-brand-500 focus:ring-brand-500" />
          Active
        </label>
      </div>
      <div class="grid sm:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-sm font-medium text-white/60 mb-2">Visitor Status</label>
          <select name="visitor_status" class="glass-select w-full">
            <option value="NONE" {% if controller.visitor_status == "NONE" %}selected{% endif %}>Home Controller</option>
            <option value="PENDING" {% if controller.visitor_status == "PENDING" %}selected{% endif %}>Pending</option>
            <option value="APPROVED" {% if controller.visitor_status == "APPROVED" %}selected{% endif %}>Approved Visitor</option>
            <option value="REJECTED" {% if controller.visitor_status == "REJECTED" %}selected{% endif %}>Rejected</option>
            <option value="REVOKED" {% if controller.visitor_status == "REVOKED" %}selected{% endif %}>Revoked</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-white/60 mb-2">Home Division / Subdivision</label>
          <input type="text" value="{{ controller.home_division }} / {{ controller.home_subdivision }}" class="glass-input w-full" disabled />
        </div>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-white/60 mb-2">Notes</label>
        <textarea name="notes" rows="3" class="glass-input w-full">{{ controller.notes }}</textarea>
      </div>
      <button type="submit" class="btn-brand">
        Save Changes
      </button>
    </form>
  </div>
</div>
{% endblock %}
