{% extends "base_admin.html" %}

{% block title %}Upload Document — Admin Panel{% endblock %}
{% block admin_section %}Documents{% endblock %}

{% block content %}
<div class="max-w-3xl">
  <div class="mb-6">
    <a href="{% url 'admin_panel:documents_list' %}" class="btn-ghost text-sm">&larr; Back to Documents</a>
  </div>
  <h1 class="text-2xl font-bold text-white mb-6">Upload Document</h1>

  <div class="glass rounded-2xl p-6">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="mb-4">
        <label class="block text-sm font-medium text-white/60 mb-2">File</label>
        <input type="file" name="file" required class="glass-input w-full file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-medium file:bg-brand-500/20 file:text-brand-300 hover:file:bg-brand-500/30" />
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-white/60 mb-2">Title</label>
        <input type="text" name="title" class="glass-input w-full" placeholder="Document title (leave blank to use filename)" />
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-white/60 mb-2">Description</label>
        <textarea name="description" rows="3" class="glass-input w-full" placeholder="Brief description of this document..."></textarea>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-white/60 mb-2">Category</label>
        <select name="category" class="glass-input w-full">
          <option value="">— No category —</option>
          {% for cat in categories %}
            <option value="{{ cat.pk }}">{{ cat.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="flex items-center gap-6 mb-6">
        <label class="flex items-center gap-2 text-sm text-white/60">
          <input type="checkbox" name="is_published" checked class="rounded border-white/10 bg-white/5 text-brand-500 focus:ring-brand-500" />
          Published
        </label>
      </div>

      <div class="flex items-center gap-3">
        <button type="submit" class="btn-brand">Upload Document</button>
        <a href="{% url 'admin_panel:documents_list' %}" class="btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
