{% extends "base.html" %}

{% block title %}Submit Feedback — {{ site_config.site_name|default:"VATéir" }}{% endblock %}

{% block content %}
<div class="bg-grid">
  <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <h1 class="text-3xl font-bold text-white mb-2"><span class="text-brand-400">///</span> Submit Feedback</h1>
    <p class="text-white/40 mb-8">Let us know about your experience with VATéir controllers.</p>

    <div class="glass rounded-2xl p-6">
      <form method="post">
        {% csrf_token %}
        <div class="grid sm:grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-sm font-medium text-white/60 mb-2">Your Name <span class="text-red-400">*</span></label>
            <input type="text" name="name" required value="{{ form_data.name|default:'' }}" class="glass-input w-full" placeholder="John Doe" />
          </div>
          <div>
            <label class="block text-sm font-medium text-white/60 mb-2">Your Email</label>
            <input type="email" name="email" value="{{ form_data.email|default:'' }}" class="glass-input w-full" placeholder="john@example.com" />
          </div>
        </div>
        <div class="grid sm:grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-sm font-medium text-white/60 mb-2">Your VATSIM CID <span class="text-red-400">*</span></label>
            <input type="text" name="cid" required value="{{ form_data.cid|default:'' }}" class="glass-input w-full font-mono" placeholder="1234567" pattern="[0-9]+" />
          </div>
          <div>
            <label class="block text-sm font-medium text-white/60 mb-2">Controller</label>
            <select id="controller-search" name="controller_cid" data-no-tomselect>
              <option value="">Search by CID or name...</option>
            </select>
          </div>
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-white/60 mb-2">Feedback Type</label>
          <select name="feedback_type" class="glass-select w-full">
            <option value="COMPLIMENT" {% if form_data.feedback_type == 'COMPLIMENT' %}selected{% endif %}>Compliment</option>
            <option value="CONCERN" {% if form_data.feedback_type == 'CONCERN' %}selected{% endif %}>Concern</option>
            <option value="SUGGESTION" {% if form_data.feedback_type == 'SUGGESTION' %}selected{% endif %}>Suggestion</option>
            <option value="BUG_REPORT" {% if form_data.feedback_type == 'BUG_REPORT' %}selected{% endif %}>Bug Report</option>
          </select>
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium text-white/60 mb-2">Your Feedback <span class="text-red-400">*</span></label>
          <textarea name="content" rows="5" required class="glass-input w-full" placeholder="Tell us about your experience...">{{ form_data.content|default:'' }}</textarea>
        </div>
        <button type="submit" class="btn-brand">
          Submit Feedback
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  if (typeof TomSelect === 'undefined') return;

  var el = document.getElementById('controller-search');
  if (!el) return;

  new TomSelect(el, {
    valueField: 'cid',
    labelField: 'display',
    searchField: ['cid', 'name'],
    placeholder: 'Search by CID or name...',
    create: false,
    dropdownParent: 'body',
    load: function(query, callback) {
      if (query.length < 2) return callback();
      fetch('/controllers/search/?q=' + encodeURIComponent(query))
        .then(function(r) { return r.json(); })
        .then(function(data) {
          callback(data.map(function(c) {
            var name = c.name ? c.cid + ' — ' + c.name + ' (' + c.rating + ')' : c.cid + ' (' + c.rating + ')';
            return { cid: String(c.cid), name: c.name || '', rating: c.rating, display: name };
          }));
        })
        .catch(function() { callback(); });
    },
    render: {
      option: function(item, escape) {
        return '<div class="option">' +
          '<span style="font-family:JetBrains Mono,monospace;opacity:0.7">' + escape(item.cid) + '</span>' +
          (item.name ? ' — ' + escape(item.name) : '') +
          ' <span style="opacity:0.4">(' + escape(item.rating) + ')</span>' +
          '</div>';
      },
      item: function(item, escape) {
        return '<div>' + escape(item.cid) + (item.name ? ' — ' + escape(item.name) : '') + '</div>';
      },
      no_results: function() {
        return '<div class="no-results">No controllers found. Type at least 2 characters.</div>';
      }
    }
  });
});
</script>
{% endblock %}
