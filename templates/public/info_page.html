{% extends "base.html" %}

{% block title %}{{ page.title }} — {{ site_config.site_name|default:"VATéir" }}{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <h1 class="text-3xl font-bold text-white mb-6"><span class="text-brand-400">///</span> {{ page.title }}</h1>
  <div class="glass rounded-2xl p-6">
    <div class="prose prose-invert max-w-none text-white/60">
      {{ page.content|safe }}
    </div>
  </div>
</div>
{% endblock %}
