{% extends "base_dashboard.html" %}

{% block title %}Sign Up — {{ event.title }}{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <h1 class="text-2xl font-bold text-white mb-2"><span class="text-brand-400">///</span> Sign Up for Event</h1>
  <p class="text-white/40 mb-6 font-mono">{{ event.title }} — {{ event.start_datetime|date:"M d, Y H:i" }}z</p>

  <div class="glass rounded-2xl p-6">
    <form method="post">
      {% csrf_token %}
      <div class="mb-6">
        <label class="block text-sm font-medium text-white/60 mb-2">Notes / Position Preferences</label>
        <textarea name="notes" rows="4" class="glass-input w-full" placeholder="Any preferences or notes..."></textarea>
      </div>
      <div class="flex items-center gap-3">
        <button type="submit" class="btn-brand">
          Submit Availability
        </button>
        <a href="{% url 'events:detail' event.slug %}" class="btn-ghost">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
