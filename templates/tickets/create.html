{% extends "base_dashboard.html" %}

{% block title %}New Ticket — {{ site_config.site_name|default:"VATéir" }}{% endblock %}

{% block content %}
    <div class="max-w-2xl mx-auto">
      <div class="mb-6">
        <a href="{% url 'tickets:list' %}" class="text-xs text-white/30 hover:text-white/60 font-mono uppercase tracking-wider">&larr; Back to Tickets</a>
        <h1 class="text-2xl font-bold text-white mt-2"><span class="text-brand-400">///</span> Submit a Ticket</h1>
        <p class="text-white/30 text-xs font-mono uppercase tracking-wider mt-1">We'll get back to you as soon as possible</p>
      </div>

      <div class="glass rounded-2xl p-6">
        <form method="post">
          {% csrf_token %}
          <div class="mb-4">
            <label class="block text-sm font-medium text-white/60 mb-2">Category</label>
            <select name="category" class="glass-select w-full">
              {% for value, label in categories %}
              <option value="{{ value }}" {% if form_data.category == value %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium text-white/60 mb-2">Subject <span class="text-red-400">*</span></label>
            <input type="text" name="subject" required maxlength="200" value="{{ form_data.subject|default:'' }}" class="glass-input w-full" placeholder="Brief summary of your issue" />
          </div>
          <div class="mb-6">
            <label class="block text-sm font-medium text-white/60 mb-2">Description <span class="text-red-400">*</span></label>
            <textarea name="description" rows="6" required class="glass-input w-full" placeholder="Describe your issue in detail...">{{ form_data.description|default:'' }}</textarea>
          </div>
          <button type="submit" class="btn-brand">Submit Ticket</button>
        </form>
      </div>
    </div>
{% endblock %}
